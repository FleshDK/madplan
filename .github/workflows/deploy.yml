name: Deploy til GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer dependencies
        run: npm install

      - name: Byg app
        run: npm run build

      - name: Upload til Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
